name: dev-notes

services:
  postgres_core:
    image: postgres:18
    container_name: postgres_core
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_CORE_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_core_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_CORE_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dev-notes-net

  postgres_search:
    image: pgvector/pgvector:pg18
    container_name: postgres_search
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_SEARCH_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_search_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_SEARCH_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dev-notes-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: dev-notes-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dev-notes-net

  core_service:
    image: node:20-alpine
    container_name: core_service
    working_dir: /app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${CORE_SERVICE_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_core:5432/${POSTGRES_CORE_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    command: >
      sh -c "npx nest start dev-notes --watch"
    volumes:
      - ../:/app
    ports:
      - "3000:3000"
    depends_on:
      postgres_core:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    labels:
      - logging=promtail
    networks:
      - dev-notes-net

  search_service:
    image: node:20-alpine
    container_name: search_service
    working_dir: /app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${SEARCH_SERVICE_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_search:5432/${POSTGRES_SEARCH_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    command: >
      sh -c "npx nest start search-service --watch"
    volumes:
      - ../:/app
    ports:
      - "3001:3001"
    depends_on:
      postgres_search:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    labels:
      - logging=promtail
    networks:
      - dev-notes-net

  loki:
    image: grafana/loki:3.0.0
    container_name: dev-notes-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/config.yaml
      - loki_data:/tmp/loki
    user: "0:0"
    networks:
      - dev-notes-net

  promtail:
    image: grafana/promtail:3.0.0
    container_name: dev-notes-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    user: "0:0"
    networks:
      - dev-notes-net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: dev-notes-grafana
    ports:
      - "3002:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - dev-notes-net

volumes:
  postgres_core_data:
  postgres_search_data:
  rabbitmq_data:
  loki_data:
  grafana_data:

networks:
  dev-notes-net:
    name: dev-notes-net
