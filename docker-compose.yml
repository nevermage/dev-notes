services:
  postgres_core:
    image: postgres:18
    container_name: postgres_core
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_CORE_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_CORE_PORT}:5432"
    volumes:
      - postgres_core_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_CORE_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - devnotes_net

  postgres_search:
    image: pgvector/pgvector:pg18
    container_name: postgres_search
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_SEARCH_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_SEARCH_PORT}:5432"
    volumes:
      - postgres_search_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_SEARCH_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - devnotes_net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - devnotes_net

  core_service:
    image: node:20-alpine
    container_name: core_service
    working_dir: /app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${CORE_SERVICE_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_core:5432/${POSTGRES_CORE_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    command: >
      sh -c "npx nest start dev-notes --watch"
    volumes:
      - .:/app
    ports:
      - "${CORE_SERVICE_PORT}:${CORE_SERVICE_PORT}"
    depends_on:
      postgres_core:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devnotes_net

  search_service:
    image: node:20-alpine
    container_name: search_service
    working_dir: /app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${SEARCH_SERVICE_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_search:5432/${POSTGRES_SEARCH_DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    command: >
      sh -c "npx nest start search-service --watch"
    volumes:
      - .:/app
    ports:
      - "${SEARCH_SERVICE_PORT}:${SEARCH_SERVICE_PORT}"
    depends_on:
      postgres_search:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devnotes_net

volumes:
  postgres_core_data:
  postgres_search_data:
  rabbitmq_data:

networks:
  devnotes_net:
    name: devnotes_net
